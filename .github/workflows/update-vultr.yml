name: Update Vultr ruleset

on:
  schedule:
    - cron: "17 4 * * *"   # каждый день 04:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generate vultr.json from RIPEstat (AS20473)
        run: bash scripts/generate-vultr.sh vultr.json

      - name: Install sing-box
        run: |
          VER="$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | grep -oE '"tag_name": *"v[^"]+"' | head -1 | grep -oE 'v[0-9.]+' | sed 's/^v//')"
          echo "sing-box version: ${VER}"
          curl -fsSL "https://github.com/SagerNet/sing-box/releases/download/v${VER}/sing-box-${VER}-linux-amd64.tar.gz" -o sb.tgz
          tar xzf sb.tgz
          sudo install -m0755 "sing-box-${VER}-linux-amd64/sing-box" /usr/local/bin/sing-box
          rm -rf sb.tgz "sing-box-${VER}-linux-amd64"

      - name: Compile vultr.srs
        run: sing-box rule-set compile --output vultr.srs vultr.json

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vultr.json vultr.srs
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore: update Vultr prefixes ($(date -u +%F))"
            git push
          fi
